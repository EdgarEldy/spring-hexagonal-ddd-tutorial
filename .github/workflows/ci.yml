name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # -T 1C matches the README's specified command; it has no real effect here since
      # arch-test depends on every other module, making the 5-module reactor a strictly
      # linear chain with nothing independent left to parallelize.
      - name: Build and test
        run: ./mvnw -T 1C clean verify
